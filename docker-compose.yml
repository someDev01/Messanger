services:

  backend:
    build:
      context: ./backend/chat
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=chatdb;Username=postgres;Password=postgres
    depends_on:
      - postgres
    volumes:
      - ./backend/chat/wwwroot:/app/wwwroot

  frontend:
    build:
      context: ./frontend/messanger
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    ports:
      - "3000:80"
    depends_on:
      - backend
    

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: chatdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres